name: Generate Daily ETF Report

on:
  workflow_dispatch:
  schedule:
    # 台灣時間 18:30 = UTC 10:30
    # 週一到週五執行
    - cron: "30 10 * * 1-5"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ETF report JSON
        run: |
          python scripts/generate_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_report.json history/*.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update daily ETF report"
          git push
