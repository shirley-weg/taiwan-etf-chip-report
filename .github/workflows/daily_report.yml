name: Generate Daily ETF Report

on:
  workflow_dispatch:
  schedule:
    # ﻣ┘٠ﻫ·£ 14:45 = UTC 06:45
    - cron: "45 6 * * 1-5"

    # ﻣ┘٠ﻫ·£ 15:15 = UTC 07:15
    - cron: "15 7 * * 1-5"

    # ﻣ┘٠ﻫ·£ 15:45 = UTC 07:45
    - cron: "45 7 * * 1-5"

    # ﻣ┘٠ﻫ·£ 16:15 = UTC 08:15
    - cron: "15 8 * * 1-5"

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    env:
      TOP_N_STOCKS: "10"
      MIN_HOLDINGS_COVERAGE_RATIO: "0.85"
      ALLOW_MASTER_ONLY_REPORT: "1"
      HTTP_TIMEOUT: "30"
      HTTP_SLEEP_SECONDS: "0.25"
      LOG_LEVEL: "INFO"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate ETF report JSON
        run: |
          python scripts/generate_report.py

      - name: Commit and push report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ history/ raw/ || true
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Update daily ETF report"
          git push
